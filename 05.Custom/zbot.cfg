//----------------------------------------------------------------------------
// 机器人（zBOT）系列参数设置
// 作者: Michael S. Booth, Turtle Rock Studios (www.turtlerockstudios.com)
// 汉化：毛毛的老公
// 日期：2026年5月20日
// 其他关联文件：game_init.cfg
// 合理配置以下参数可对机器人进行个性化定制
//----------------------------------------------------------------------------

// 机器人数量
// 默认："10"
bot_quota "20"

// 机器人填充模式
// fill -将踢出与连接玩家数量相等的机器人.
// normal -玩家数量对机器人数量没有影响. 
// 默认："fill"
bot_quota_mode "fill"                

// 设置机器人数量与玩家数量的比例 (即. «机器人的数量=玩家的数量* bot_quota_match_ratio»).   
// 当玩家加入或离开服务器时，游戏中的机器人数量将相应调整.     
// 这个参数将取代"bot_quota".   
// bot_quota_match                        
                                       
// 设置机器人加入的团队. 
// ct - 警察. t - 匪徒. any - 两者随机.
// 默认："any"                                      
bot_join_team "any"    

// 机器人难度级别. 
// 0- 入门级. 1 - 正常级. 2 - 半职业级. 3 - 专业级. 
// 仅对新加入的机器人有效.
// 在输入此命令之前已经存在的机器人将保持原有技能水平.
// 默认："2"
bot_difficulty "2"                     

// 是否支持死亡竞赛模式
// 0 - 不支持死亡竞赛模式，机器人将执行地图任务.
// 1 - 支持死亡竞赛模式，机器人不执行地图任务.
// 默认："0"
bot_deathmatch "0"      

// 是否允许机器人自动退出，为玩家腾出位置
// 1 - 是.玩家进入，机器人自动退出
// 0 - 否.机器人不退出
// 默认："1"
bot_auto_vacate "1"     

// 机器人队标
// 默认：""
bot_prefix "Zbot - "

// 设置值若不为零，机器人将等待玩家加入后方可进入游戏.
//
// 0 - 禁用 (换图后机器人立即进入服务器)
// 1 - 严格模式 (机器人等待第一个真实玩家进入服务器且选择队伍后方才加入)
// 2 - 宽松模式 (机器人等待第一真实玩家进入服务器后即加入，即使真实玩家处于M6状态)
//
// 默认: "1"
bot_join_after_player "1"              

// 是否阻止机器人完成地图任务
// 1 - 是|0 - 否
// 默认："1"
bot_defer_to_human "0"                

// 机器人是否只能慢走
// 1 - 是|0 - 可以走、跑、跳.
// 默认："0"
bot_walk "0"                           

// 机器人是否静止不动.
// 1 - 是|0 - 否
// 默认："0"
bot_stop "0"     

// 是否允许机器人使用/购买手枪
// 1 - 是|0 - 否
// 默认："1"
bot_allow_pistols "1"  

// 是否允许机器人使用/购买霰弹枪
// 1 - 是|0 - 否
// 默认："1"
bot_allow_shotguns "1"  

// 是否允许机器人使用/购买冲锋枪.
// 1 - 是|0 - 否
// 默认："1"
bot_allow_sub_machine_guns "1"  

// 是否允许机器人使用/购买步枪
// 1 - 是|0 - 否
// 默认："1"
bot_allow_rifles "1"    

// 是否允许机器人使用机枪
// 1 - 是|0 - 否
// 默认："1"
bot_allow_machine_guns "1"  

// 是否允许机器人使用/购买手榴弹
// 1 - 是|0 - 否
// 默认："1"
bot_allow_grenades "1" 

// 是否允许机器人使用/购买狙击枪
// 1 - 是|0 - 否
// 默认："1"
bot_allow_snipers "1"  

// 是否允许机器人使用防护盾牌
// 1 - 是|0 - 否
// 默认："0"
bot_allow_shield "0"    

// 是否允许机器人使用无线电指令
// off - 禁止|normal - 允许
// 默认："off"
bot_chatter "normal"  

// 是否允许机器人无视无线电指令
// 1 - 是|0 - 否
// 默认："1"
bot_allow_rogues "0"                   

// 是否强制机器人使用匕首.
// 1 - 是|0 - 否   
// 默认："0"                                                         
bot_knives_only  "0"  

// 是否强制机器人使用手枪.
// 1 - 是|0 - 否
// 默认："0" 
bot_pistols_only  "0" 

// 是否强制机器人使用狙击枪.
// 1 - 是|0 - 否
// 默认："0" 
bot_snipers_only  "0"

// 是否允许机器人使用所有枪械.
// 1 - 是|0 - 否
// 默认："1" 
bot_all_weapons  "1"   