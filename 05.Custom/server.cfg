// CS1.6服务器参数设置
// 编制汉化：毛毛的老公
// 日期：2026年5月20日  
// 官方参数设置        
echo -=|：->>>>>>>>>>>>>>一、加载官方HLDS参数->>>>>>>>>>>>>>>>
//
// 服务器名称、密码及作者信息
hostname "CS1.6服务器基础平台"	              // ★★服务器名称(默认："Half-Life dedicated server").
rcon_password "2026" 	                    // ★★★★★服务器OP密码(默认："").
sv_rcon_banpenalty "0" 			     		// 输入错误OP密码的封禁时间(以分钟为单位)(默认：0 - 永久封禁)
sv_rcon_maxfailures "10"         		    // OP密码输入错误的次数(默认：10).
sv_rcon_minfailures "5"		     			// 在 sv_rcon_minfailuretime 指定时间内OP密码输入错误的累计次数上限，失败则封禁(默认：5).
sv_rcon_minfailuretime "30"	   			    // 输入正确OP密码的时间(以秒为单位)(首次输入错误后在设定时间内需输入正确密码，否则封禁)(默认：30).
sv_password ""
//
// 玩家协议限制
// 注：强制正版可以有效避免盗版客户端可能带入的非法文件，确保游戏公平
// 通过修改reunion.cfg参数，可以强制服务器正版化，也可以限定盗版玩家必须挂载sXe
// 如无需完全正版化，可根据reunion.cfg和reunion.txt文件中的中文释义进行修改
// reunion.cfg和reunion.txt文件位置：cstrike目录下
dp_rejmsg_nosteam47       "警告：检测到使用盗版47p协议客户端，请使用正版"
dp_rejmsg_nosteam48       "警告：检测到使用盗版48p协议客户端，请使用正版"
dp_rejmsg_pending         "警告：SteamID未通过认证，请重新登陆Steam平台"
dp_rejmsg_revemu          "警告：检测到使用revEmu模拟器，请使用正版"
dp_rejmsg_steamemu        "警告：检测到使用steamEmu模拟器，请使用正版"
dp_rejmsg_oldrevemu       "警告：检测到使用旧版revEmu模拟器，请使用正版"
dp_rejmsg_avsmp           "警告：检测到使用avsmp模拟器，请使用正版"
dp_rejmsg_revemu_sc2009   "警告：检测到使用revemu模拟器，请使用正版"
dp_rejmsg_revemu2013      "警告：检测到使用revEmu 2013模拟器，请使用正版"
//
// 网络优化参数
sv_lan "0" 							        // ★★1 -LAN模式|0 - Internet模式.启用后，只有本地网络客户端可以进入服务器(默认："0").
sv_lan_rate "100000"		 			    // ★★★★★如果服务器sv_lan 1，那么在这种模式下的客户端速率(以及sv_minrate和sv_maxrate)(默认：20000).
sv_maxrate "100000"				    		// ★★★★★服务器可以单独发送给每个客户端的最大值(默认：0)★.
sv_minrate "60000" 					    	// ★★★★★服务器可以分别发送给每个客户端的最小值(默认：0)★.
sv_maxupdaterate "102" 				    	// ★★★★★服务器向客户端发送更新的最大频率(默认：30)★.
sv_minupdaterate "60" 			    		// ★★★★★服务器向客户端发送更新的最小频率(默认：10).
sys_ticrate "1100" 			    			// ★★★★★服务器最大FPS(默认：100)★.
mm_insane "0"                               // 服务器加速器mmtimer参数，与"sys_ticrate"配合使用(0 - 保持FPS1000| 1 - 保持FPS1100~5000|2 - FPS5000以上且CPU全速).
//
// 游戏环境参数
// mp_系列
mp_autokick "0"                             // 是否自动将长时间不动的玩家踢出服务器.(1 - 启用|0 - 禁用)(默认："1").
mp_autokick_timeout	"-1"                    // 玩家被踢出服务器的时间 (以秒为单位) (默认 -1).
mp_autoteambalance "0"                      // ★★是否启用自动团队平衡(1 - 启用|0 - 禁用)(默认：1).
mp_buytime	"0.25"                          // ★★每局购买武器装备时间(以分钟为单位)(默认：1.5 = 90秒).
mp_c4timer "35"                             // ★★炸弹埋设后的爆炸时间(以秒为单位)(默认：45).
mp_chattime "10"        				    // ★★地图加载前和结束后的通话时长(以秒为单位)(默认：10).
mp_consistency "1" 						    // 客户端文件验证(默认：1).
mp_fadetoblack "0" 					    	// 是否死后黑屏(0 - |1 - 是)(默认：0).
mp_flashlight "1" 						    // ★★是否启用手电筒(1 - 启用|0 - 禁用)(默认：0).
mp_footsteps "1"				    	    // 是否启用脚步声(1 - 启用|0 - 禁用)(默认：1).
mp_forcecamera "2" 						    // ★★玩家死亡后的视角(与 mp_forcechasecam 完全相同，如果两者设置均不为0，则使用mp_forcechasecam).
                                            //(0 - 全部视角|1 - 仅队友视角且不可自由观看|2 - 仅队友的主视角)(默认：0).
mp_forcechasecam "2"					    // 玩家死亡后的视角(0 - 全部视角|1 - 仅队友视角且不可自由观看|2 - 仅队友的主视角)(默认：0).
mp_freezetime "0" 						    // ★★每回合开局冻结时间(以秒为单位)(默认：6).
mp_friendlyfire "0"					        // 是否启用友军伤害(1 - 启用|0 - 禁用)(默认：0).
mp_hostagepenalty "0" 					    // ★★杀害人质达到设定数量后即自动被踢出服务器(默认：13).
mp_kickpercent "1" 					        // 投票踢人所需达到的通过比率(默认：0.66).
mp_mapvoteratio "1" 					    // 投票换图所需达到的通过比率(默认：0.66).
mp_limitteams "0" 						    // 一支队伍允许超过另一支队伍的玩家人数(默认：2).
mp_maxrounds "0"					        // 回合数达到设定值后自动更换地图(默认：0).
mp_mirrordamage "0"					        // 是否队友伤害反噬(对队友不造成伤害，但自己会受伤)(0 - 否|1 - 是)(默认：0).
mp_playerid "0" 				     	    // ★★准星指向对手或队友时的信息显示(0 - 全部显示|1 - 仅显示队友|2 - 不显示)(默认：0).
mp_roundtime "9999"						    // ★★每回合的时间(以分钟为单位)(默认：5).
mp_startmoney "16000"				        // 回合开始的金钱数量(默认：800).
mp_timelimit "0"      			            // ★★每张地图的时间(以分钟为单位)(默认：20).
mp_tkpunish "0"						        // 杀害队友惩罚(0 - 不惩罚|n - 杀害队友超过n人时下一回合自动死亡)(默认：0).
mp_windifference "1"				        // ★★不同胜场的地图变化 (1 - (ТТ - 5 胜, СТ - 10 胜)|0 - 禁用)(默认：1).
mp_winlimit "0"						        // 一方团队获胜次数达到设定值时即更换地图(默认：0).
mp_logdetail "0" 						    // 攻击信息日志(0 - 不记录| 1 - 记录).
mp_logecho "0" 						     	// 服务器控制台日志信息显示(0 - 不显示| 1 - 显示).
mp_logfile "0"							    // 服务器日志写入文件记录(0 - 不记录| 1 - 记录).
mp_logmessages "0"						    // 是否记录聊天消息(0 - 不记录| 1 - 记录).
// sv_系列
sv_aim "0" 						    		// 是否启用自瞄(1 - 启用|0 - 禁用)(默认：0).
sv_accelerate "5" 						    // 玩家奔跑时的加速度(默认：5)
sv_airaccelerate "10"		 		        // 玩家在空中转向或移动时的加速度(默认：10)
sv_allow_dlfile "1" 					    // 是否允许下载文件.(如果设置为1且有sv_downloadurl,则跳转至高速下载链接下载(1 - 允许|0 - 禁止)(默认：1).
sv_allowdownload "1" 					    // 是否允许客户端从服务器下载文件(1 - 允许|0 - 禁用)(默认：1).
sv_allowupload "1"						    // ★★是否允许客户端将喷图上传到服务器(1 - 允许|0 - 禁止)(默认：1).
sv_alltalk "1"     							// ★★是否允许两队在比赛中互相交谈 (1 - 启用|0 - 禁用)(默认：0).
sv_bounce "1"                               // 碰撞时的反弹系数.
sv_cheats "0" 							    // 是否允许在游戏中使用作弊代码(1 - 允许|0 - 禁用)(默认：0).
sv_contact ""                			    // ★服务器联系信息.
sv_downloadurl ""                           // ★★高速下载链接(可使用IIS、HFS等搭建下载服务器)(默认："").
sv_friction "4"						        // 地面摩擦力(默认：4).
sv_gravity "800"					        // 重力 (默认：800).
sv_maxspeed "320" 						    // 最大移动速度(默认 320).
sv_maxunlag "0.5" 						    // 最大延迟补偿(每秒)(默认：0.5).
sv_newunit	"1"                             // 自动清理上张之前关卡产生的游戏存档数据，以保持游戏存档文件的大小尽可能的小一些
sv_proxies "1" 					    		// 能够将 HLTV 连接到服务器(1 - 是|0 -否)大于1时允许连接多个)(默认：1).
sv_restart "0" 							    // 重新启动游戏的延时时间(以秒计). (类似sv_restartround)(默认：0).
sv_send_logos "1"						    // ★★是否允许服务器向客户端发送第三方标识(需要sv_allowdownload 1).(1 - 允许|0 - 禁止)(默认：1).
sv_send_resources "1"					    // 是否允许服务器向客户端发送受保护的资源(1 - 允许|0 - 禁止)(默认：1).
sv_stats "1" 						        // 是否启用服务器信息收集(统计). (1 - 启用|0 - 禁用)(默认：1).
sv_stepsize "18"					        // 不跳跃时可行走的最高高度(默认：18).
sv_stopspeed "75" 						    // 地面上的最小停止速度(默认：75).
sv_timeout "30" 				     	    // 客户端连接服务器的超时时限(以秒计)(默认：60).
sv_unlag "1"						        // 是否允许对客户端进行延迟补偿，即允许cl_lc, cl_lw 和 cl_lb.(1 - 允许|0 - 禁止)(默认：1).
sv_unlagpush "0.0"				    	    // 是否禁用服务器延迟补偿(1 - 开启|0 - 禁用)(默认："0.0").
sv_unlagsamples "1"					        // 计算客户端延迟的数据包(默认：1).
sv_maxunlag "0.5" 						    // 最大延迟补偿(每秒)(默认：0.5).
sv_uploadmax "0.5"						    // 限制客户端喷图的最大大小(以M单位)(默认：0.5).
sv_voiceenable "1"  					    // 是否启用麦克风(1- 启用|0 - 禁用(默认：1).
sv_wateraccelerate "10"				        // 玩家在水中的加速度(默认：10).
sv_waterfriction "1"				        // 水下的摩擦力(默认：1).
// 其他
allow_spectators "1"                        // 是否允许客户端以观察者的身份加入服务器.
decalfrequency	"30"                        // 客户端喷图的间隔时间.
edgefriction "2"                            // 玩家在某个实体或固拼的边缘跳跃时用于增加减速度.当参数值设定较高时，玩家重力感增强(默认："2").
humans_join_team "any"                      // 是否限制玩家加入团队(any - 可选所有团队| ct  - 仅限加入CT|t - 仅限加入T)(默认：any).
max_queries_sec "3.0"					    // 每秒对客户端查询的次数(默认："3.0").
max_queries_sec_global "30"			        // 每秒允许的查询总数(默认："30").
max_queries_window "60" 				    // 指定查询的时间段时长(秒)(默认："60").
pausable "0"							    // 是否允许服务器上使用pause键暂停(1 - 启用|0 - 禁止)(默认："0").
log "off"                                   // ★★是否记录日志(on - 启用|off - 禁用).
mapcyclefile "mapcycle.txt" 			    // 地图列表文件，用于在 mp_timelimit 或获胜/回合数结束时自动更改地图(默认："mapcycle.txt").
motdfile "motd.txt" 		        	    // ★选择队伍前在窗口中显示文本的文件名(默认："motd.txt").
servercfgfile "server.cfg" 	        	    // ★服务器启动时的基本配置文件(默认："server.cfg").
mapchangecfgfile "server.cfg"               // 换图时加载的配置文件名称.
lservercfgfile	"listenserver.cfg"          // 侦听服务端(Listen Server)启动时所加载的配置文件名称.
