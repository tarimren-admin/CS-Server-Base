// ReHLDS(3.15.0.896)参数设置区
// 编制汉化：毛毛的老公
// 日期：2026年5月20日  


listipcfgfile "listip.cfg"                                 // 永久封禁IP文件(默认：listip.cfg).
syserror_logfile "sys_error.log"                           // 系统错误日志文件. (默认：sys_error.log).
sv_auto_precache_sounds_in_models "1"                      // 是否自动预缓存附加到模型的声音(0 - 否|1 - 是)(默认：0).
sv_delayed_spray_upload "0"                                // ★★是否进入游戏后而不是在连接时上传自定义喷图.提高上传速度(0 - 否|1 - 是)(默认：0).
sv_echo_unknown_cmd "0"                                    // ★★是否在控制台显示所执行的未知命令信息(0 - 否|1 - 是)(默认：0). 
sv_rcon_condebug "0"                                       // 是否在控制台打印RCON调试信息(0 - 否|1 - 是)(默认：0).
sv_force_ent_intersection "0"                              // ★★在第三方插件中是否修复SOLID_SLIDEBOX实体卡住的错误(0 - 否|1 - 是)(默认：0).
sv_rehlds_force_dlmax "1"                                  // ★★是否强制客户端的 cl_dlmax 参数为1024，以避免过多的数据包碎片(0 - 否|1 - 是)(默认：0).
sv_rehlds_hull_centering "0"                               // ★★是否使用模型中心而非周边作为参考点，以修复地图纹理中缺少实体的错误(0 - 否|1 - 是)(默认：0).
sv_rehlds_movecmdrate_max_avg "400"                        // ★★客户端发送给服务器的"move"命令达到触发封禁时的平均最大频率(默认：400).
                                                           // "move"命令包括前进、后退、向左、向右、跳跃、蹲下、转向等，每个"move"命令都包含玩家的位置、速度及方向信息.
                                                           // 限制玩家单位时间内发送的移动命令平均数，防止通过高频指令作弊
sv_rehlds_movecmdrate_avg_punish "-1"                      // ★★客户端执行"move"命令平均值达到设定上限时被封禁的时间 (0 - 永久封禁|使用负数代表踢出)(默认：5分钟).
sv_rehlds_movecmdrate_max_burst "2500"                     // ★★客户端执行"move"命令突发值达到封禁时的上限值(默认：2500).
                                                           // 限制玩家短时间内发送的移动命令峰值，针对突发作弊行为
sv_rehlds_movecmdrate_burst_punish "-1"                    // ★★客户端执行"move"命令突发值达到上限值时被封禁的时间 (0 - 永久封禁|使用负数代表踢出)(默认：5分钟).
sv_rehlds_stringcmdrate_max_avg "80"                       // ★★客户端执行"string"命令达到封禁时的平均值(默认：80).
                                                           // "string"命令包括发送给服务器的字符串命令，包括聊天信息、绑定命令等，服务器根据信息更新游戏状态或响应客户端请求.
                                                           // 限制玩家单位时间内发送的字符串命令平均数，以防止通过指令刷屏或作弊
sv_rehlds_stringcmdrate_avg_punish "-1"                    // ★★客户端执行"string"命令平均值值达到设定上限时被封禁的时间 (0 - 永久封禁|使用负数代表踢出)(默认：5分钟).
sv_rehlds_stringcmdrate_max_burst "400"                    // ★★客户端执行"string"命令突发值达到封禁时的上限值(默认：400).
                                                           // 限制玩家短时间内发送的字符串命令峰值
sv_rehlds_stringcmdrate_burst_punish "-1"                  // ★★客户端执行"string"命令突发值达到上限值时被封禁的时间 (0 - 永久封禁|使用负数代表踢出)(默认：5分钟).
sv_rehlds_userinfo_transmitted_fields "" 
                                                           // setinfo 字段将从服务器传递给客户端. 
                                                           // 如果未设置，则将传输所有字段(带下划线的前缀除外). 
                                                           // 每个字段须以反斜杠为前缀，例如："\name\model\*sid\*hltv\bottomcolor\topcolor". 
                                                           // 字段定义查阅：https://github.com/dreamstalker/rehlds/wiki/Userinfo-keys.
                                                           // 默认: "" 即：传输所有字段
sv_rehlds_attachedentities_playeranimationspeed_fix "0"    // ★★修复玩家有附加实体时步态动画速度增加的bug.(默认：0)
                                                           // 当 cl_updaterate 较低时，可能会导致动画滞后
sv_rehlds_maxclients_from_single_ip "32"                   // 限制单个IP地址同时连接的数量, 不会影响已经连接的玩家(默认：5).
sv_rehlds_local_gametime "1"                               // ★★是否减少长时间运行一张地图时的"lags"(0 - 否|1 - 是)(默认：0).
sv_rehlds_allow_large_sprays "1"                           // ★★是否允许大于64x64的自定义喷图(0 - 否|1 - 是)(默认：0).
sv_use_entity_file "0"                                     // 为地图使用自定义实体文件，实体文件的路径："maps/[map name].ent". 
                                                           // |0 - 使用原始实体. |1 - 使用maps目录下的.ent文件|2 - 使用maps目录下的.ent文件，如无文件则创建.ent文件(默认：0).
sv_usercmd_custom_random_seed "0"                          // 启用后，服务器将独立于客户端建立附加模型(默认：0).此参数可能会增加服务器负载和网络延迟，因此应谨慎选择合适的值.
                                                           // 建立附加模型将增加游戏的随机性，让作弊者更难以预测或破解随机数生成器，从而提高游戏的公平性和安全性，提高防作弊能力.
sv_net_incoming_decompression "1"                          // 是否启用对传入的压缩文件传输负载进行解压.开启后服务器会解压传入的压缩文件传输负载，提升数据传输效率(0 - 否|1 - 是)(默认：1).
sv_net_incoming_decompression_max_ratio "80"               // 设置文件传输中压缩与未压缩数据的最大允许比率(默认：80).
                                                           // 接近90的比率表示具有低熵的大量未压缩数据.
sv_net_incoming_decompression_max_size "65536"             // 设置解压后文件传输数据的最大允许大小(默认：65536).
sv_net_incoming_decompression_min_failures "4"             // 设置触发玩家惩罚前所需的最小解压失败次数(0-10)(默认：4).
sv_net_incoming_decompression_max_failures "10"            // 设置在指定时间内允许的解压失败的最大次数，超过该次数将对玩家采取行动(0-10)(默认：10).
sv_net_incoming_decompression_min_failuretime "0.1"        // 设置用于跟踪解压失败以确定玩家是否超过失败阈值的最短时间(秒)(默认：0.1)
sv_net_incoming_decompression_punish "-1"                  // 玩家因异常或错误的bzip2片段被封禁的时间(分钟)(0 - 永久|使用负数代表踢出)(默认：-1)
sv_tags ""                                                 // 定义服务器"游戏标签"的字符串，如果设置，允许用户/脚本在匹配/服务器浏览器界面中根据值过滤(默认:"")
sv_filterban "1"                                           // 按IP模式进行数据包过滤(-1 - 无例外地拒绝所有玩家|0 - 不进行任何检查|1 - 检查所有进入的玩家是否被IP封禁,如果有则被踢出)(默认：1)
sv_rehlds_movecmd_max_ticks "24"                           // 设置服务器在单帧内能处理来自单个玩家移动指令的最大数量.包括命令本身，不包括数据包(默认：24)
sv_rehlds_movecmd_max_null_streak "0"                      // 定义允许的最大连续零持续时间移动命令(空命令)数量(0 - 禁用该检查)(默认：0)
sv_rehlds_movecmd_clamp_interp "1"                         // 定义服务器是否阻止无效(超出范围)的"ex_interp"值的移动命令(默认：1)
sv_rehlds_movecmdtime_samples "120"                        // 定义服务器计算客户端移动速度平均值所使用的帧数.(数值越高越准确,但检测速度越慢)(默认：120)
sv_rehlds_movecmdtime_max_error "300"                      // 定义客户端游戏时钟相对于服务器时钟可提前或延迟的最大毫秒数.如果超过此限制,服务器将评估客户端游戏速度(默认：300)
                                                           // 仅当客户端同时违反"sv_rehlds_movecmdtime_max_scale"或"sv_rehlds_movecmdtime_min_scale"限制时才会施加处罚.
sv_rehlds_movecmdtime_max_scale "3.0"                      // 定义客户端基础游戏速度比例最大值.超过此倍数加速游戏将被警告.(默认：3.0)
sv_rehlds_movecmdtime_min_scale "0.5"                      // 定义客户端基础游戏速度比率最小值.低于此倍数降速时将被警告(默认：0.5)
sv_rehlds_movecmdtime_max_warnings "-1"                    // 在对玩家处罚前允许的速度作弊/慢动作警告的最大次数.(-1 - 禁用检测)(默认：-1)
sv_rehlds_movecmdtime_punish "3.0"                         // 玩家因速度作弊/减速被封禁的时间(分钟)(-1 - 踢出| 0 - 永久封禁)(默认: -1)
sv_rehlds_send_mapcycle "0"                                // 是否在服务器信息中发送mapcycle.txt(HLDS行为，但在客户端上未使用)(0 - 否|1 - 是)(默认：0).